name: CI

on:
  push:
    branches:
      - main
      - dev/codex
  pull_request:
    branches:
      - main
      - dev/codex
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Full Test Chain
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install JS dependencies
        run: npm install

      - name: Install V8 via jsvu
        run: npx jsvu --os=linux64 --engines=v8

      - name: Test
        run: npm test
