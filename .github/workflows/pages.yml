name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build wasm package
        run: sh scripts/build-wasm.sh

      - name: Prepare site
        run: |
          rm -rf dist
          mkdir -p dist/pkg/compiler
          mkdir -p dist/pkg/executor
          cp index.html dist/
          cp pkg/compiler/js_vm_compiler.js dist/pkg/compiler/
          cp pkg/compiler/js_vm_compiler_bg.wasm dist/pkg/compiler/
          cp pkg/compiler/js_vm_compiler.d.ts dist/pkg/compiler/
          cp pkg/compiler/js_vm_compiler_bg.wasm.d.ts dist/pkg/compiler/
          cp pkg/compiler/package.json dist/pkg/compiler/
          cp pkg/executor/js_vm_executor.js dist/pkg/executor/
          cp pkg/executor/js_vm_executor_bg.wasm dist/pkg/executor/
          cp pkg/executor/js_vm_executor.d.ts dist/pkg/executor/
          cp pkg/executor/js_vm_executor_bg.wasm.d.ts dist/pkg/executor/
          cp pkg/executor/package.json dist/pkg/executor/
          touch dist/.nojekyll

      - name: Verify site payload
        run: |
          test -f dist/index.html
          test -f dist/pkg/compiler/js_vm_compiler.js
          test -f dist/pkg/compiler/js_vm_compiler_bg.wasm
          test -f dist/pkg/executor/js_vm_executor.js
          test -f dist/pkg/executor/js_vm_executor_bg.wasm
          find dist -maxdepth 3 -type f | sort

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
